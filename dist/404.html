<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ITIApp</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // When GitHub Pages 404s on a deep path (e.g. /ITIApp/german),
    // this page encodes the path into the query string and redirects
    // to the root index.html, which then restores it via history.replaceState.
    //
    // pathSegmentsToKeep = 1  →  keeps "/ITIApp" (the repo/base segment)
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
